<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <h1>Memory Game Admin</h1>
      <p class="subtitle">Administrative Dashboard</p>
    </div>

    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          class="form-input"
          [(ngModel)]="username" 
          name="username"
          placeholder="Enter your username"
          (keypress)="onKeyPress($event)"
          [disabled]="isLoading"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-input"
          [(ngModel)]="password" 
          name="password"
          placeholder="Enter your password"
          (keypress)="onKeyPress($event)"
          [disabled]="isLoading"
          required
        />
      </div>

      @if (errorMessage) {
        <div class="error-message">
          <span class="error-icon">⚠️</span>
          {{ errorMessage }}
        </div>
      }

      @if (successMessage) {
        <div class="success-message">
          <span class="success-icon">✓</span>
          {{ successMessage }}
        </div>
      }

      <button 
        type="submit" 
        class="login-button"
        [disabled]="isLoading"
      >
        @if (isLoading) {
          <span class="spinner"></span>
          Logging in...
        } @else {
          Login
        }
      </button>
    </form>

    <div class="demo-info">
      <p><strong>Demo Credentials:</strong></p>
      <p>Username: <code>Henk</code></p>
      <p>Password: <code>password</code></p>
    </div>
  </div>
</div>
