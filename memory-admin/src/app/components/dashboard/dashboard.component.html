<div class="dashboard-wrapper">
  <app-header (onLogout)="logout()" (onRefresh)="refreshData()"></app-header>

  <main class="dashboard-main">
    @if (isLoading) {
      <div class="loading-container">
        <div class="spinner"></div>
        <p>Loading dashboard data...</p>
      </div>
    } @else if (errorMessage) {
      <div class="error-container">
        <div class="error-icon">⚠️</div>
        <h2>Oops! Something went wrong</h2>
        <p>{{ errorMessage }}</p>
        <button class="retry-button" (click)="refreshData()">Try Again</button>
      </div>
    } @else if (dashboardData) {
      <div class="dashboard-content">
        <!-- Statistics Cards -->
        <section class="stats-section">
          <h2>Overview</h2>
          <div class="stats-grid">
            <app-stats-card 
              title="Total Games Played"
              [value]="dashboardData.aggregate.totalGames"
              icon="🎮"
              color="primary"
            ></app-stats-card>
            <app-stats-card 
              title="Registered Players"
              [value]="dashboardData.aggregate.totalPlayers"
              icon="👥"
              color="success"
            ></app-stats-card>
            <app-stats-card 
              title="API Integrations"
              [value]="dashboardData.aggregate.apis.length"
              icon="🔌"
              color="info"
            ></app-stats-card>
          </div>
        </section>

        <!-- Charts Section -->
        <section class="charts-section">
          <div class="chart-container">
            <app-api-chart [data]="dashboardData.aggregate.apis"></app-api-chart>
          </div>
          <div class="chart-container">
            <app-games-chart [data]="dashboardData.dateStats"></app-games-chart>
          </div>
        </section>

        <!-- Players List Section -->
        <section class="players-section">
          <app-players-list [players]="dashboardData.players"></app-players-list>
        </section>
      </div>
    }
  </main>
</div>
